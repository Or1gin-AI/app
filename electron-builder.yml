appId: com.originai.app
productName: OriginAI
directories:
  buildResources: resources
  output: dist
files:
  - "!resources/sidecar/**"
extraResources:
  - from: "resources/sidecar/${platform}-${arch}/"
    to: "sidecar/"
    filter:
      - "**/*"
artifactName: "OriginAI-${version}-${os}-${arch}.${ext}"
mac:
  category: public.app-category.utilities
  icon: resources/icon.icns
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: "OriginAI-${version}-win-${arch}-setup.${ext}"
linux:
  icon: resources/icon.png
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
publish:
  provider: github
  owner: Or1gin-AI
  repo: app
