appId: com.originai.app
productName: OriginAI
directories:
  buildResources: resources
  output: dist
files:
  - "!resources/sidecar/**"
extraResources:
  - from: "resources/sidecar/${platform}-${arch}/"
    to: "sidecar/"
    filter:
      - "**/*"
mac:
  category: public.app-category.utilities
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
publish:
  provider: github
  owner: Or1gin-AI
  repo: app
