name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
  VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog from tag
        run: git tag -l --format='%(contents)' ${{ github.ref_name }} > /tmp/changelog.md

      - name: Delete existing release if any
        run: gh release delete ${{ github.ref_name }} --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with changelog
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes-file /tmp/changelog.md --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download latest Xray (macOS)
        run: bash scripts/download-xray.sh darwin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build helper (macOS)
        run: bash scripts/build-helper.sh darwin

      - name: Write .env
        run: |
          echo "VITE_PUBLIC_POSTHOG_PROJECT_TOKEN=${VITE_PUBLIC_POSTHOG_PROJECT_TOKEN}" >> .env
          echo "VITE_PUBLIC_POSTHOG_HOST=${VITE_PUBLIC_POSTHOG_HOST}" >> .env

      - name: Prepare Apple API key
        run: |
          cat > "${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" <<'EOF'
          ${{ secrets.APPLE_API_KEY_P8 }}
          EOF

      - run: pnpm build

      - name: Build Electron (macOS)
        run: pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

  build-win:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download latest Xray (Windows)
        shell: bash
        run: bash scripts/download-xray.sh win32
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build helper (Windows)
        shell: bash
        run: bash scripts/build-helper.sh win32

      - name: Write .env
        shell: bash
        run: |
          echo "VITE_PUBLIC_POSTHOG_PROJECT_TOKEN=${VITE_PUBLIC_POSTHOG_PROJECT_TOKEN}" >> .env
          echo "VITE_PUBLIC_POSTHOG_HOST=${VITE_PUBLIC_POSTHOG_HOST}" >> .env

      - run: pnpm build

      - name: Build Electron (Windows)
        run: pnpm exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-x64:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download latest Xray (Linux)
        run: bash scripts/download-xray.sh linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build helper (Linux)
        run: bash scripts/build-helper.sh linux

      - name: Write .env
        run: |
          echo "VITE_PUBLIC_POSTHOG_PROJECT_TOKEN=${VITE_PUBLIC_POSTHOG_PROJECT_TOKEN}" >> .env
          echo "VITE_PUBLIC_POSTHOG_HOST=${VITE_PUBLIC_POSTHOG_HOST}" >> .env

      - run: pnpm build

      - name: Build Electron (Linux x64)
        run: pnpm exec electron-builder --linux --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [build-mac, build-win, build-linux-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract changelog and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git cat-file -p ${{ github.ref_name }} | sed '1,/^$/d' > /tmp/changelog.md
          gh release edit ${{ github.ref_name }} --notes-file /tmp/changelog.md --draft=false --repo ${{ github.repository }}
